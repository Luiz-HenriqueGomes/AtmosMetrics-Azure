name: Build and deploy Python app to Azure Web App - app-atmosmetrics

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and start virtual environment
        run: |
          python -m venv antenv
          source antenv/bin/activate

      - name: Install dependencies
        run: |
          source antenv/bin/activate
          cd backend
          pip install -r requirements.txt

      # O startup.sh diz ao Azure como iniciar a app corretamente
      - name: Create startup script
        run: |
          cat > backend/startup.sh << 'EOF'
          #!/bin/bash
          cd /home/site/wwwroot
          source antenv/bin/activate 2>/dev/null || true
          export PYTHONPATH=/home/site/wwwroot
          exec uvicorn app.main:app --host 0.0.0.0 --port 8000
          EOF
          chmod +x backend/startup.sh

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/
            !backend/**/__pycache__
            !backend/**/*.pyc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-atmosmetrics'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
          startup-command: 'bash /home/site/wwwroot/startup.sh'
